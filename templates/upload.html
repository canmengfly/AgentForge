{% extends "base.html" %}
{% block title %}上传文档{% endblock %}
{% block page_title %}上传文档{% endblock %}
{% block page_subtitle %}支持 PDF、Word、TXT、Markdown、HTML 格式{% endblock %}

{% block content %}
<div x-data="uploader()" x-init="init()" style="max-width:700px;">

  <div class="card-panel">

    <!-- Tabs -->
    <div class="tabs" style="padding:0 1.25rem;margin-bottom:0;border-bottom:1px solid #f1f5f9;">
      <ul>
        <li :class="tab==='file'?'is-active':''">
          <a @click="tab='file'" style="font-size:13.5px;gap:7px;padding:.75rem 1rem;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            文件上传
          </a>
        </li>
        <li :class="tab==='text'?'is-active':''">
          <a @click="tab='text'" style="font-size:13.5px;gap:7px;padding:.75rem 1rem;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            文本粘贴
          </a>
        </li>
      </ul>
    </div>

    <div style="padding:1.5rem;">

      <!-- Collection picker -->
      <div class="field" style="margin-bottom:1.35rem;">
        <label class="label" style="font-size:13px;color:#374151;font-weight:600;">存入集合</label>
        <div class="field has-addons" style="margin:0;">
          <div class="control is-expanded">
            <input class="input" type="text" x-model="collection" placeholder="default（不填则使用默认集合）" />
          </div>
          <template x-if="existingCols.length > 0">
            <div class="control">
              <div class="select">
                <select @change="if($event.target.value) collection=$event.target.value">
                  <option value="">已有集合…</option>
                  <template x-for="c in existingCols" :key="c.name">
                    <option :value="c.name" x-text="c.name + ' (' + c.count + ' 块)'"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>
        </div>
        <p class="help">文档将存入此命名空间，搜索时按集合隔离</p>
      </div>

      <!-- ── File tab ─────────────────────────────────────────── -->
      <div x-show="tab === 'file'">
        <div class="drop-zone" :class="dragging ? 'dragging' : ''"
             @dragover.prevent="dragging=true"
             @dragleave.prevent="dragging=false"
             @drop.prevent="handleDrop($event)"
             @click="$refs.fileInput.click()">
          <svg width="44" height="44" fill="none" stroke="#c7d2de" stroke-width="1.3" viewBox="0 0 24 24" style="margin:0 auto 0.9rem;display:block;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          <p style="color:#334155;font-size:14px;font-weight:600;margin-bottom:4px;">拖拽文件到此处，或点击选择</p>
          <p style="color:#94a3b8;font-size:12.5px;">PDF · DOCX · TXT · MD · HTML</p>
          <input x-ref="fileInput" type="file" style="display:none;"
                 accept=".pdf,.docx,.txt,.md,.html,.htm"
                 @change="handleFileSelect($event)" />
        </div>

        <!-- Selected file preview -->
        <template x-if="selectedFile">
          <div style="margin-top:0.9rem;display:flex;align-items:center;gap:10px;padding:0.8rem 1rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;">
            <div style="width:36px;height:36px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="18" height="18" fill="none" stroke="#555" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13.5px;font-weight:500;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="selectedFile.name"></div>
              <div style="font-size:12px;color:#94a3b8;" x-text="(selectedFile.size/1024).toFixed(1) + ' KB'"></div>
            </div>
            <button @click="selectedFile=null;$refs.fileInput.value=''" type="button"
                    style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;"
                    onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#94a3b8'">✕</button>
          </div>
        </template>

        <button type="button"
                class="button is-primary is-fullwidth"
                style="margin-top:1rem;font-weight:600;"
                :class="uploading ? 'is-loading' : ''"
                :disabled="!selectedFile || uploading"
                @click="uploadFile()">
          上传文件
        </button>
      </div>

      <!-- ── Text tab ─────────────────────────────────────────── -->
      <div x-show="tab === 'text'">
        <div class="field">
          <label class="label" style="font-size:13px;font-weight:600;color:#374151;">文档标题 <span style="color:#ef4444;">*</span></label>
          <div class="control">
            <input class="input" type="text" x-model="textTitle" placeholder="例：2024年Q4产品规划" autofocus />
          </div>
        </div>
        <div class="field">
          <label class="label" style="font-size:13px;font-weight:600;color:#374151;">
            文档内容 <span style="color:#ef4444;">*</span>
            <span style="float:right;font-weight:400;color:#94a3b8;font-size:12px;" x-text="textContent.length + ' 字符'"></span>
          </label>
          <div class="control">
            <textarea class="textarea" x-model="textContent" rows="11"
                      placeholder="粘贴文档全文，系统将自动分块并向量化…"
                      style="font-size:13.5px;resize:vertical;line-height:1.65;"></textarea>
          </div>
        </div>
        <button type="button"
                class="button is-primary is-fullwidth"
                style="font-weight:600;"
                :class="uploading ? 'is-loading' : ''"
                :disabled="!textTitle.trim() || !textContent.trim() || uploading"
                @click="addText()">
          保存文档
        </button>
      </div>

    </div>
  </div>

  <!-- Result -->
  <div x-show="result" x-cloak style="margin-top:1rem;">
    <div class="notification is-compact"
         :class="result && result.ok ? 'is-success is-light' : 'is-danger is-light'"
         style="border-radius:10px;display:flex;align-items:flex-start;gap:10px;">
      <button class="delete" @click="result=null"></button>
      <div>
        <strong x-text="result && result.ok ? '✓ 上传成功' : '✕ 上传失败'"></strong><br/>
        <span x-text="result && result.message"></span>
      </div>
    </div>
  </div>

</div>

<script>
function uploader() {
  return {
    tab: 'file', collection: 'default', existingCols: [],
    selectedFile: null, dragging: false,
    textTitle: '', textContent: '',
    uploading: false, result: null,

    async init() {
      const data = await fetch('/me/collections').then(r => r.json());
      this.existingCols = data.collections || [];
    },
    handleDrop(e) {
      this.dragging = false;
      const f = e.dataTransfer.files[0];
      if (f) this.selectedFile = f;
    },
    handleFileSelect(e) { this.selectedFile = e.target.files[0] || null; },

    async uploadFile() {
      if (!this.selectedFile) return;
      this.uploading = true; this.result = null;
      try {
        const form = new FormData();
        form.append('file', this.selectedFile);
        const res = await fetch(`/me/documents/upload?collection=${encodeURIComponent(this.collection||'default')}`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) { this.result = { ok: false, message: data.detail || '上传失败' }; }
        else {
          this.result = { ok: true, message: `《${data.title}》已分成 ${data.chunk_count} 个块，存入集合「${data.collection}」` };
          this.selectedFile = null; await this.init();
        }
      } catch { this.result = { ok: false, message: '网络错误，请稍后重试' }; }
      finally { this.uploading = false; }
    },

    async addText() {
      if (!this.textTitle.trim() || !this.textContent.trim()) return;
      this.uploading = true; this.result = null;
      try {
        const res = await fetch('/me/documents/text', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: this.textTitle, content: this.textContent, collection: this.collection || 'default' })
        });
        const data = await res.json();
        if (!res.ok) { this.result = { ok: false, message: data.detail || '保存失败' }; }
        else {
          this.result = { ok: true, message: `《${data.title}》已分成 ${data.chunk_count} 个块，存入集合「${data.collection}」` };
          this.textTitle = ''; this.textContent = ''; await this.init();
        }
      } catch { this.result = { ok: false, message: '网络错误，请稍后重试' }; }
      finally { this.uploading = false; }
    }
  };
}
</script>
{% endblock %}
