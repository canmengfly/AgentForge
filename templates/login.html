<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — AgentForge</title>
  <style>
    @import "https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css";
    :root {
      --bulma-primary-h: 0; --bulma-primary-s: 0%; --bulma-primary-l: 8%;
      --bulma-primary: hsl(0,0%,8%);
      --bulma-primary-invert-l: 100%;
      --bulma-primary-light-l: 92%;
      --bulma-primary-dark-l: 4%;
    }
    html, body { height: 100%; margin: 0; background: #0a0a0a; }
    [x-cloak] { display: none !important; }
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: #fff; border-radius: 12px;
      padding: 2.25rem 2rem; width: 100%; max-width: 350px;
    }
    .input:focus, .textarea:focus {
      border-color: #111 !important;
      box-shadow: 0 0 0 2px rgba(0,0,0,.07) !important;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
<div class="login-wrap"
     x-data="{
       username: '',
       password: '',
       loading: false,
       error: '',
       async submit() {
         this.loading = true; this.error = '';
         try {
           const res = await fetch('/auth/login', {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ username: this.username, password: this.password })
           });
           const data = await res.json();
           if (!res.ok) { this.error = data.detail || '登录失败'; }
           else { window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard'; }
         } catch { this.error = '网络错误，请稍后重试'; }
         finally { this.loading = false; }
       }
     }">

  <div style="width:100%;max-width:350px;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2.25rem;">
      <img src="/static/AgentForge.svg" alt="AgentForge"
           style="width:220px;height:auto;max-width:100%;display:inline-block;filter:invert(1);opacity:.88;" />
      <p style="color:rgba(255,255,255,.25);font-size:16px;margin-top:9px;letter-spacing:.03em;">
        Agent Data Distillation Platform
      </p>
    </div>

    <div class="login-card">
      <h2 style="font-size:15px;font-weight:700;color:#111;margin:0 0 1.4rem;">登录账户</h2>

      <!-- Error -->
      <div class="notification is-danger is-light" x-show="error" x-cloak
           style="padding:.6rem .85rem;font-size:13px;margin-bottom:1rem;border-radius:7px;">
        <span x-text="error"></span>
      </div>

      <form @submit.prevent="submit">
        <div class="field">
          <label class="label" style="font-size:12px;color:#666;font-weight:600;margin-bottom:5px;">用户名</label>
          <div class="control">
            <input class="input" type="text" placeholder="输入用户名"
                   x-model="username" required autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label class="label" style="font-size:12px;color:#666;font-weight:600;margin-bottom:5px;">密码</label>
          <div class="control">
            <input class="input" type="password" placeholder="输入密码"
                   x-model="password" required autocomplete="current-password" />
          </div>
        </div>

        <div class="field" style="margin-top:1.25rem;">
          <div class="control">
            <button type="submit"
                    class="button is-fullwidth"
                    :class="loading ? 'is-loading' : ''"
                    :disabled="loading || !username || !password"
                    style="background:#111;color:#fff;border:none;font-weight:600;
                           height:2.5rem;border-radius:7px;font-size:14px;">
              登录
            </button>
          </div>
        </div>
      </form>
    </div>

    <p style="text-align:center;color:rgba(255,255,255,.45);font-size:12.5px;margin-top:1.25rem;letter-spacing:.01em;">
      首次使用：<code style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border-radius:4px;padding:1px 6px;font-size:12px;">admin</code>
      &nbsp;/&nbsp;
      <code style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border-radius:4px;padding:1px 6px;font-size:12px;">admin123</code>
    </p>
  </div>
</div>
</body>
</html>
